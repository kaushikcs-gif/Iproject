<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#f1f3f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

.login-box h2{
    color:#2874f0;
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

.login-box button{
    width:100%;
    padding:12px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.login-box button:hover{
    background:#0d5bd3;
}

.login-box p{
    margin-top:15px;
}

.login-box a{
    color:#2874f0;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Flipkart Login</h2>

<input
type="text"
id="username"
placeholder="Enter Username">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<p>
Don't have an account?
<a href="#">Sign Up</a>
</p>

</div>

<script>

function login(){

let username=document.getElementById("username").value;

let password=document.getElementById("password").value;

if(username=="" || password==""){

alert("Please fill all fields.");

}

else{

alert("Login Successful!");

window.location.href="index.html";

}

}

</script>

</body>
</html>
